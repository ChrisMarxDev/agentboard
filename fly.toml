# Fly.io app manifest for AgentBoard.
#
# The app name is deliberately NOT committed here so the public repo does not
# leak any specific deployment identity. Supply it at runtime via the FLY_APP
# env var (or `--app <name>` flag).
#
# One-time setup (outside this repo):
#   export FLY_APP=<your-app-name>
#   fly launch --no-deploy --copy-config --name "$FLY_APP"
#   fly secrets set AGENTBOARD_AUTH_TOKEN=$(openssl rand -hex 32) --app "$FLY_APP"
#   fly tokens create deploy -x 999999h --app "$FLY_APP"   # → GH secret FLY_API_TOKEN
#   gh secret set FLY_APP_NAME --body "$FLY_APP"
#
# Deploys happen via .github/workflows/deploy.yml on push to main.

primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  # Ephemeral: state is wiped on every machine restart / redeploy.
  # If you want persistence, mount a volume and set this to the mount path.
  AGENTBOARD_PATH = "/tmp/agentboard"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
