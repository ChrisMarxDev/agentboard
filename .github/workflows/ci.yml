name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Stub frontend/dist for go:embed
        # The root `frontend_embed.go` declares `//go:embed all:frontend/dist`,
        # which go vet / test / build all resolve transitively through
        # internal/cli/serve.go. The real frontend is built in the separate
        # `frontend` job, so this job just needs a non-empty directory to
        # satisfy the embed pattern. A single placeholder file is enough.
        run: |
          mkdir -p frontend/dist
          touch frontend/dist/.ci-placeholder

      - name: gofmt
        run: |
          unformatted=$(gofmt -l cmd internal frontend_embed.go)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./cmd/... ./internal/...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false
          build-tags: ""
          packages: ./cmd/... ./internal/...

      - name: go test
        run: go test -race -count=1 ./cmd/... ./internal/...

      - name: go build
        run: go build -o /tmp/agentboard ./cmd/agentboard

  frontend:
    name: Frontend lint + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  landing:
    name: Landing build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [go, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build binary
        run: go build -o agentboard ./cmd/agentboard

      - name: Run integration tests
        run: ./scripts/integration-test.sh
