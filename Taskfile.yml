version: "3"

vars:
  BINARY: agentboard
  PORT: "3000"

includes:
  landing:
    taskfile: ./landing/Taskfile.yml
    dir: ./landing

tasks:
  default:
    desc: List available tasks
    cmds:
      - task -l
    silent: true

  build:
    desc: Build frontend + Go binary
    deps: [build:frontend]
    cmds:
      - go build -ldflags="-s -w" -o {{.BINARY}} ./cmd/agentboard
    sources:
      - "**/*.go"
      - frontend/dist/**/*
    generates:
      - "{{.BINARY}}"

  build:frontend:
    desc: Build the React frontend
    deps: [install:frontend]
    dir: frontend
    cmds:
      - npm run build
    sources:
      - src/**/*
      - index.html
      - vite.config.*
      - package.json
    generates:
      - dist/**/*

  install:frontend:
    desc: Install frontend npm dependencies
    dir: frontend
    cmds:
      - npm install
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/.package-lock.json

  dev:
    desc: Run frontend dev server + Go backend in parallel (Vite HMR + --dev proxy)
    deps: [dev:frontend, dev:backend]

  dev:frontend:
    desc: Run Vite dev server with HMR
    dir: frontend
    cmds:
      - npm run dev
    internal: true

  dev:backend:
    desc: Run Go server in dev mode (proxies to Vite at localhost:5173)
    cmds:
      - go run ./cmd/agentboard --dev --no-open --port {{.PORT}}
    internal: true

  run:
    desc: Run the built binary (pass flags with -- e.g. task run -- --port 3001)
    deps: [build]
    cmds:
      - ./{{.BINARY}} {{.CLI_ARGS}}

  test:
    desc: Run all tests (Go + frontend)
    deps: [test:go, test:frontend]

  test:go:
    desc: Run Go unit tests
    cmds:
      - go test ./cmd/... ./internal/...

  test:frontend:
    desc: Run frontend vitest suite
    dir: frontend
    cmds:
      - npm run test

  test:integration:
    desc: Build and run the end-to-end integration test script
    deps: [build]
    cmds:
      - ./scripts/integration-test.sh

  lint:
    desc: Run all linters (Go + frontend)
    deps: [lint:go, lint:frontend]

  lint:go:
    desc: Run gofmt check + go vet
    cmds:
      - |
        unformatted=$(gofmt -l cmd internal frontend_embed.go)
        if [ -n "$unformatted" ]; then
          echo "gofmt violations:"
          echo "$unformatted"
          exit 1
        fi
      - go vet ./cmd/... ./internal/...

  lint:frontend:
    desc: Run ESLint on the frontend
    dir: frontend
    deps: [install:frontend]
    cmds:
      - npm run lint

  fmt:
    desc: Apply gofmt to all Go files
    cmds:
      - gofmt -w cmd internal frontend_embed.go

  typecheck:frontend:
    desc: TypeScript typecheck for the frontend
    dir: frontend
    deps: [install:frontend]
    cmds:
      - npm run typecheck

  test:bruno:
    desc: Run the Bruno contract test suite (bruno/tests) against a running server on $PORT
    cmds:
      - |
        for d in 00-setup 01-data 02-content 03-components 04-mcp 05-meta 06-files 07-errors 08-grab 99-teardown; do
          echo "--- tests/$d ---"
          (cd bruno && bru run "tests/$d" --env Local --env-var baseUrl=http://localhost:{{.PORT}}) || exit 1
        done
    preconditions:
      - sh: command -v bru
        msg: "bru CLI not installed — run: npm install -g @usebruno/cli"

  deploy:vps:
    desc: Install or update AgentBoard on a Debian/Ubuntu VPS over SSH (pass flags with -- e.g. task deploy:vps -- --host root@vps --domain ab.example.com)
    cmds:
      - ./scripts/deploy-vps.sh {{.CLI_ARGS}}

  clean:
    desc: Remove build artifacts
    deps: [landing:clean]
    cmds:
      - rm -f {{.BINARY}}
      - rm -rf frontend/dist
