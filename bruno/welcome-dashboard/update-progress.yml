http:
  method: PATCH
  url: "{{baseUrl}}/api/data/welcome.progress"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "value": 7,
        "label": "Almost there"
      }

runtime:
