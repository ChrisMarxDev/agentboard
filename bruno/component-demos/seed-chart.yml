      value: application/json
  body:
    type: json
    data: |-
      [
        { "name": "Mon", "value": 12 },
        { "name": "Tue", "value": 19 },
        { "name": "Wed", "value": 8 },
        { "name": "Thu", "value": 24 },
        { "name": "Fri", "value": 16 }
      ]

runtime:
