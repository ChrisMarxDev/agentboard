info:
  name: List keys with Bearer token
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/data"
  headers:
    - name: Authorization
      value: "Bearer {{process.env.AGENTBOARD_AUTH_TOKEN}}"
      enabled: true

runtime:
  scripts:
    - type: tests
      code: |-
        test("status is 200", function() {
          expect(res.status).to.equal(200);
        });
        test("response is an object", function() {
          expect(res.body).to.be.an("object");
        });
