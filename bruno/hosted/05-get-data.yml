info:
  name: GET /api/data/demo.bruno.hosted
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/api/data/demo.bruno.hosted"
  headers:
    - name: Authorization
      value: "Bearer {{process.env.AGENTBOARD_AUTH_TOKEN}}"
      enabled: true

runtime:
  scripts:
    - type: tests
      code: |-
        test("status is 200", function() {
          expect(res.status).to.equal(200);
        });
        test("value was persisted", function() {
          expect(res.body.value.message).to.equal("hello from bruno");
        });
        test("X-Agent-Source was recorded", function() {
          expect(res.body.updated_by).to.equal("bruno-hosted");
        });
