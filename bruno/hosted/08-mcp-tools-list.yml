info:
  name: MCP tools/list (requires token)
  type: http
  seq: 8

http:
  method: POST
  url: "{{baseUrl}}/mcp"
  headers:
    - name: Authorization
      value: "Bearer {{process.env.AGENTBOARD_AUTH_TOKEN}}"
      enabled: true
    - name: Content-Type
      value: application/json
      enabled: true
  body:
    type: json
    data: |-
      {
        "jsonrpc": "2.0",
        "id": 1,
        "method": "tools/list",
        "params": {}
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("status is 200", function() {
          expect(res.status).to.equal(200);
        });
        test("returns a tools array", function() {
          expect(res.body.result.tools).to.be.an("array");
          expect(res.body.result.tools.length).to.be.greaterThan(0);
        });
