info:
  name: Upload a CSV export (demo/users.csv)
  type: http
  seq: 3

http:
  method: PUT
  url: "{{baseUrl}}/api/files/demo/users.csv"
  headers:
    - name: Content-Type
      value: text/csv
  body:
    type: text
    data: |-
      id,name,role,active,joined
      u1,Alice,Engineer,true,2023-01-12
      u2,Bob,Designer,true,2023-04-03
      u3,Carol,PM,false,2022-09-21
      u4,Dilip,Engineer,true,2024-02-15

runtime:
  scripts:
    - type: tests
      code: |-
        test("status 200", function() { expect(res.status).to.equal(200); });
        test("name echoes demo/users.csv", function() {
          expect(res.body.name).to.equal("demo/users.csv");
        });
