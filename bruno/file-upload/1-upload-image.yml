info:
  name: Upload an SVG image (demo/banner.svg)
  type: http
  seq: 1

# Bruno's axios JSON-stringifies raw Buffer bodies, so SVG (text) is the safest
# format to upload through this transport. For real PNG/JPG uploads from agents,
# use `agentboard_write_file` (MCP) with a base64 payload — that path is binary-safe.
http:
  method: PUT
  url: "{{baseUrl}}/api/files/demo/banner.svg"
  headers:
    - name: Content-Type
      value: image/svg+xml
  body:
    type: text
    data: |-
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180">
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#10b981"/>
          </linearGradient>
        </defs>
        <rect width="600" height="180" fill="url(#g)" rx="16"/>
        <text x="300" y="105" text-anchor="middle" fill="white"
              font-family="sans-serif" font-size="36" font-weight="700">
          Hello from AgentBoard
        </text>
      </svg>

runtime:
  scripts:
    - type: tests
      code: |-
        test("status 200", function() { expect(res.status).to.equal(200); });
        test("response confirms name + image/svg+xml", function() {
          expect(res.body.name).to.equal("demo/banner.svg");
          expect(res.body.content_type).to.equal("image/svg+xml");
          expect(res.body.url).to.equal("/api/files/demo/banner.svg");
        });
