info:
  name: Fetch the uploaded SVG banner
  type: http
  seq: 5

# Demonstrates the full GET — note the Content-Type and ETag headers in the
# response panel. Re-running this request twice and adding an If-None-Match
# header with the previous ETag yields a 304 (see tests/06-files/03).
http:
  method: GET
  url: "{{baseUrl}}/api/files/demo/banner.svg"

runtime:
  scripts:
    - type: tests
      code: |-
        test("status 200", function() { expect(res.status).to.equal(200); });
        test("served as image/svg+xml", function() {
          expect((res.headers['content-type'] || '').toLowerCase()).to.include("image/svg");
        });
        test("ETag set (quoted)", function() {
          expect(res.headers['etag']).to.match(/^".+"$/);
        });
        test("X-Content-Type-Options nosniff", function() {
          expect((res.headers['x-content-type-options'] || '').toLowerCase()).to.equal("nosniff");
        });
