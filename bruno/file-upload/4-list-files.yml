info:
  name: List all files in the project
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/api/files"

runtime:
  scripts:
    - type: tests
      code: |-
        test("status 200", function() { expect(res.status).to.equal(200); });
        test("returns an array", function() { expect(res.body).to.be.an("array"); });
        test("three demo/* files are listed", function() {
          const names = res.body.map(f => f.name);
          expect(names).to.include("demo/banner.svg");
          expect(names).to.include("demo/report.pdf");
          expect(names).to.include("demo/users.csv");
        });
