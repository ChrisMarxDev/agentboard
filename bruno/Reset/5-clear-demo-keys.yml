info:
  name: Clear all demo.* keys
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/api/data"

runtime:
  scripts:
    - type: after-response
      code: |-
        const axios = require('axios');
        const baseUrl = bru.getEnvVar("baseUrl");
        const demoKeys = Object.keys(res.body).filter(k => k.startsWith('demo.'));
        for (const k of demoKeys) {
          try {
            await axios.delete(`${baseUrl}/api/data/${encodeURIComponent(k)}`);
          } catch (e) {
            console.log(`failed to delete ${k}:`, e.message);
          }
        }
        bru.setVar("clearedKeys", demoKeys.length);
        console.log(`Cleared ${demoKeys.length} demo.* keys: ${demoKeys.join(', ')}`);
    - type: tests
      code: |-
        test("status is 200", function() {
          expect(res.status).to.equal(200);
        });
