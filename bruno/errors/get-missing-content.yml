info:
  name: GET unknown content path returns 404
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/content/does-not-exist"

runtime:
  scripts:
    - type: tests
      code: |-
        test("status is 404", function() {
          expect(res.status).to.equal(404);
        });
        test("error body has NOT_FOUND code", function() {
          expect(res.body.code).to.equal("NOT_FOUND");
        });
