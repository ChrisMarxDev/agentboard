info:
  name: Seed every showcase.* key (rich demo data for all 17 components)
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/api/health"

runtime:
  scripts:
    - type: tests
      code: |-
        const axios = require('axios');
        const baseUrl = bru.getEnvVar("baseUrl");
        const put = (key, value) => axios.put(`${baseUrl}/api/data/${encodeURIComponent(key)}`, value, {
          headers: { 'Content-Type': 'application/json' },
        });

        test("server is reachable", function() {
          expect(res.status).to.equal(200);
        });

        test("seeded all showcase.* keys", async function() {
          // Metrics + Counter
          await put("showcase.users", 12847);
          await put("showcase.revenue", 48230.5);
          await put("showcase.completion", 78);
          await put("showcase.live", Math.floor(Math.random() * 100));

          // Status (3 variants)
          await put("showcase.status.running", { state: "running", label: "Dev server", detail: "Vite HMR" });
          await put("showcase.status.passing", { state: "passing", label: "CI",         detail: "Build #142" });
          await put("showcase.status.failing", { state: "failing", label: "Deploy",     detail: "timed out" });

          // Badges (5 variants)
          await put("showcase.badge.version", "v1.2.3");
          await put("showcase.badge.prod",    { text: "prod",      variant: "success" });
          await put("showcase.badge.staging", { text: "staging",   variant: "accent" });
          await put("showcase.badge.warn",    { text: "degraded",  variant: "warning" });
          await put("showcase.badge.error",   { text: "down",      variant: "error" });

          // Progress (3 stages)
          await put("showcase.progress.early", { value: 2,  max: 10, label: "Setup" });
          await put("showcase.progress.late",  { value: 8,  max: 10, label: "Build" });
          await put("showcase.progress.done",  { value: 10, max: 10, label: "Deploy" });

          // Charts
          await put("showcase.chart.bar", [
            { name: "Mon", value: 12 }, { name: "Tue", value: 19 }, { name: "Wed", value: 8 },
            { name: "Thu", value: 24 }, { name: "Fri", value: 16 }, { name: "Sat", value: 22 },
            { name: "Sun", value: 14 },
          ]);
          await put("showcase.chart.pie", [
            { name: "Chrome",  value: 64 }, { name: "Safari", value: 19 },
            { name: "Firefox", value: 11 }, { name: "Edge",   value: 6  },
          ]);

          // TimeSeries (24 hourly points)
          const points = Array.from({ length: 24 }, (_, i) => {
            const h = String(i).padStart(2, "0") + ":00";
            const base = 50 + Math.sin(i / 3) * 30;
            return { x: h, y: Math.round(base + Math.random() * 20) };
          });
          await put("showcase.metrics", points);

          // Table
          await put("showcase.table", [
            { id: "u1", name: "Alice",   role: "Engineer",  active: true,  joined: "2023-01-12" },
            { id: "u2", name: "Bob",     role: "Designer",  active: true,  joined: "2023-04-03" },
            { id: "u3", name: "Carol",   role: "PM",        active: false, joined: "2022-09-21" },
            { id: "u4", name: "Dilip",   role: "Engineer",  active: true,  joined: "2024-02-15" },
            { id: "u5", name: "Eve",     role: "Marketing", active: true,  joined: "2024-07-01" },
          ]);

          // List with status dots
          await put("showcase.list", [
            { title: "Build the API",        status: "done" },
            { title: "Wire up SSE",          status: "done" },
            { title: "Polish dashboard",     status: "in_progress" },
            { title: "Write the docs",       status: "todo" },
            { title: "Cut v1 release",       status: "blocked" },
          ]);

          // Log (10 entries, mixed levels)
          const now = new Date();
          const log = [
            ["info",  "Server booted on :3000"],
            ["info",  "MCP server registered 13 tools"],
            ["debug", "Component watcher started"],
            ["info",  "SSE client connected"],
            ["warn",  "Slow query: 412ms"],
            ["info",  "User upserted: id=u4"],
            ["error", "Failed to reach upstream: timeout"],
            ["info",  "Retry succeeded after 1.2s"],
            ["debug", "GC: 12.4MB freed"],
            ["info",  "Healthcheck OK"],
          ].map(([level, message], i) => ({
            timestamp: new Date(now.getTime() + i * 1000).toISOString().slice(11, 19),
            level, message,
          }));
          await put("showcase.log", log);

          // Kanban (4 columns)
          await put("showcase.tasks", [
            { id: "1", title: "Spec the v2 layout",         status: "done" },
            { id: "2", title: "Ship Mermaid component",     status: "done" },
            { id: "3", title: "Write Bruno tests",          status: "done" },
            { id: "4", title: "Polish dark theme",          status: "in_progress" },
            { id: "5", title: "Add session feature",        status: "in_progress" },
            { id: "6", title: "Implement actions API",      status: "review" },
            { id: "7", title: "Sketch hosted auth",         status: "todo" },
            { id: "8", title: "Write blog post",            status: "todo" },
          ]);

          // Markdown (rich content)
          await put("showcase.markdown",
            "## Latest run summary\n\n" +
            "- Processed **12,847** events in `2m 14s`\n" +
            "- **3 errors** flagged for review\n" +
            "- Throughput: ~95 events/sec\n\n" +
            "See the [full log](https://example.com/runs/142) or rerun with `agentboard set runs.kick true`."
          );

          // Code (JavaScript snippet)
          await put("showcase.code", {
            code:
              "function fibonacci(n) {\n" +
              "  const seq = [0, 1]\n" +
              "  while (seq.length < n) {\n" +
              "    seq.push(seq.at(-1) + seq.at(-2))\n" +
              "  }\n" +
              "  return seq\n" +
              "}\n\n" +
              "console.log(fibonacci(10))",
            language: "javascript",
          });

          // Mermaid: flowchart + sequence
          await put("showcase.mermaid.flow",
            "graph LR\n" +
            "  Agent[Claude Agent] -->|POST /api/data| Server((AgentBoard))\n" +
            "  Server -->|SSE| Browser{{Browser}}\n" +
            "  Server --> SQLite[(SQLite)]\n" +
            "  Browser -.->|useData| Server"
          );
          await put("showcase.mermaid.sequence",
            "sequenceDiagram\n" +
            "  participant A as Agent\n" +
            "  participant S as Server\n" +
            "  participant B as Browser\n" +
            "  A->>S: PUT /api/data/ci.status\n" +
            "  S->>S: record history\n" +
            "  S-->>B: SSE event\n" +
            "  B->>B: re-render"
          );
        });
