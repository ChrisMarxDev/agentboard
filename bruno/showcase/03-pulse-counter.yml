info:
  name: Pulse the live counter (flashes Counter on /showcase)
  type: http
  seq: 3

http:
  method: PUT
  url: "{{baseUrl}}/api/data/showcase.live"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      0

runtime:
  scripts:
    - type: before-request
      code: |-
        // Randomize the value each call so it differs from the previous,
        // forcing Counter to flash green (up) or red (down).
        bru.setVar("pulseValue", Math.floor(Math.random() * 100));
    - type: tests
      code: |-
        test("status 200", function() { expect(res.status).to.equal(200); });
