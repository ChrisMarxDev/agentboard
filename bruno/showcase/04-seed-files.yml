info:
  name: Upload showcase files (PNG, PDF, CSV) and wire them into showcase.* keys
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/api/health"

runtime:
  scripts:
    - type: before-request
      code: |-
        const axios = require('axios');
        const baseUrl = bru.getEnvVar("baseUrl");

        // 1. A hero image. We upload an SVG (text-based) instead of a PNG
        // because Bruno's axios corrupts raw binary bodies, but plain strings
        // survive the wire 1:1. SVG proves the <Image> component works against
        // an uploaded file without needing binary fidelity.
        const SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120">
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#3b82f6"/>
              <stop offset="100%" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
          <rect width="320" height="120" fill="url(#g)" rx="12"/>
          <text x="160" y="68" text-anchor="middle" fill="white"
                font-family="sans-serif" font-size="24" font-weight="600">
            AgentBoard
          </text>
        </svg>`;
        await axios.put(
          `${baseUrl}/api/files/showcase/hero.svg`,
          SVG,
          { headers: { "Content-Type": "image/svg+xml" }, validateStatus: () => true },
        );

        // 2. A bare-bones PDF (valid enough to identify as application/pdf).
        const PDF = [
          "%PDF-1.4",
          "1 0 obj << /Type /Catalog /Pages 2 0 R >> endobj",
          "2 0 obj << /Type /Pages /Kids [3 0 R] /Count 1 >> endobj",
          "3 0 obj << /Type /Page /Parent 2 0 R /MediaBox [0 0 300 100] >> endobj",
          "xref",
          "0 4",
          "0000000000 65535 f",
          "trailer << /Size 4 /Root 1 0 R >>",
          "%%EOF",
        ].join("\n");
        await axios.put(
          `${baseUrl}/api/files/showcase/q4-report.pdf`,
          PDF,
          { headers: { "Content-Type": "application/pdf" }, validateStatus: () => true },
        );

        // 3. A CSV export.
        const CSV = "id,name,role,active\nu1,Alice,Engineer,true\nu2,Bob,Designer,true\nu3,Carol,PM,false\n";
        await axios.put(
          `${baseUrl}/api/files/showcase/users.csv`,
          CSV,
          { headers: { "Content-Type": "text/csv" }, validateStatus: () => true },
        );

        // Wire the files into showcase.* keys so the page's <Image source=...>
        // and <File source=...> bindings work without hardcoded paths.
        const setJson = (key, value) => axios.put(
          `${baseUrl}/api/data/${encodeURIComponent(key)}`, value,
          { headers: { "Content-Type": "application/json" }, validateStatus: () => true },
        );
        await setJson("showcase.file.hero",   { file: "showcase/hero.svg", alt: "Hero banner" });
        await setJson("showcase.file.report", { file: "showcase/q4-report.pdf", label: "Q4 financials (PDF)" });
        await setJson("showcase.file.export", { file: "showcase/users.csv", label: "Team export (CSV)" });
    - type: tests
      code: |-
        test("health reachable (files seeded in before-request)", function() {
          expect(res.status).to.equal(200);
        });
