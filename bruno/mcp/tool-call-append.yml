info:
  name: MCP tools/call agentboard_append
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/mcp"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "jsonrpc": "2.0",
        "id": 6,
        "method": "tools/call",
        "params": {
          "name": "agentboard_append",
          "arguments": {
            "key": "demo.mcp_log",
            "item": { "msg": "appended via MCP", "ts": "2026-04-19" }
          }
        }
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("status is 200", function() {
          expect(res.status).to.equal(200);
        });
        test("no JSON-RPC error", function() {
          expect(res.body.error).to.be.undefined;
        });
