info:
  name: MCP tools/call agentboard_merge
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/mcp"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "jsonrpc": "2.0",
        "id": 5,
        "method": "tools/call",
        "params": {
          "name": "agentboard_merge",
          "arguments": {
            "key": "demo.from_mcp",
            "value": { "merged": true }
          }
        }
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("status is 200", function() {
          expect(res.status).to.equal(200);
        });
        test("no JSON-RPC error", function() {
          expect(res.body.error).to.be.undefined;
        });
