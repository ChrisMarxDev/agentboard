info:
  name: Reject overwriting a built-in (Metric)
  type: http
  seq: 4

http:
  method: PUT
  url: "{{baseUrl}}/api/components/Metric"
  headers:
    - name: Content-Type
      value: application/javascript
  body:
    type: text
    data: |-
      export default () => <div>hijacked</div>

runtime:
  scripts:
    - type: tests
      code: |-
        test("rejects built-in overwrite with 409", function() {
          expect(res.status).to.equal(409);
          expect(res.body.code).to.equal("BUILTIN_COMPONENT");
        });
