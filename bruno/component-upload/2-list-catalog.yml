info:
  name: Confirm ScoreBadge appears in catalog
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/api/components"

runtime:
  scripts:
    - type: tests
      code: |-
        test("status is 200", function() {
          expect(res.status).to.equal(200);
        });
        test("ScoreBadge is listed as a user component", function() {
          const found = res.body.find(c => c.name === "ScoreBadge");
          expect(found).to.exist;
          expect(found.type).to.equal("user");
        });
