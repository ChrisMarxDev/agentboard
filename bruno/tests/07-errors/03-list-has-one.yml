info:
  name: GET /api/errors surfaces the recorded Mermaid failure
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/errors"

runtime:
  scripts:
    - type: tests
      code: |-
        test("status 200", function() { expect(res.status).to.equal(200); });
        test("array of length 1", function() {
          expect(res.body).to.be.an("array");
          expect(res.body.length).to.equal(1);
        });
        test("shape is correct", function() {
          const e = res.body[0];
          expect(e.component).to.equal("Mermaid");
          expect(e.page).to.equal("/features/files");
          expect(e.error).to.include("Parse error");
          expect(e.count).to.equal(1);
          expect(e.first_seen).to.be.a("string");
          expect(e.last_seen).to.be.a("string");
          bru.setVar("errorKey", e.key);
        });
