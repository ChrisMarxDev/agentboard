info:
  name: Different error on same component creates a distinct entry
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/api/errors"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "component": "Markdown",
        "source": "dev.principles",
        "page": "/principles",
        "error": "Could not parse expression with acorn"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        const axios = require('axios');
        test("status 200", function() { expect(res.status).to.equal(200); });
        test("buffer now has two distinct entries", async function() {
          const r = await axios.get(`${bru.getEnvVar("baseUrl")}/api/errors`);
          expect(r.data.length).to.equal(2);
          const components = r.data.map(e => e.component).sort();
          expect(components).to.deep.equal(["Markdown", "Mermaid"]);
        });
