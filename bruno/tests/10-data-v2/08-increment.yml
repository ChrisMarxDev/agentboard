info:
  name: POST :op=increment — atomic counter, conflict-free
  type: http
  seq: 8

http:
  method: POST
  url: "{{baseUrl}}/api/v2/data/test.v2.counter?op=increment"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {"by": 5}

runtime:
  scripts:
    - type: tests
      code: |-
        test("status 200", function() { expect(res.status).to.equal(200); });
        test("counter created at 5", function() { expect(res.body.value).to.equal(5); });
        test("shape is singleton", function() { expect(res.body._meta.shape).to.equal("singleton"); });
