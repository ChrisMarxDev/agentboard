info:
  name: MCP initialize returns server info + capabilities
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/mcp"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"bruno","version":"1"}}}

runtime:
  scripts:
    - type: tests
      code: |-
        test("status 200", function() { expect(res.status).to.equal(200); });
        test("jsonrpc 2.0", function() { expect(res.body.jsonrpc).to.equal("2.0"); });
        test("id echoed", function() { expect(res.body.id).to.equal(1); });
        test("serverInfo.name is agentboard", function() {
          expect(res.body.result.serverInfo.name).to.equal("agentboard");
        });
        test("capabilities.tools present", function() {
          expect(res.body.result.capabilities.tools).to.exist;
        });
