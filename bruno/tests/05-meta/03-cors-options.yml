info:
  name: OPTIONS preflight returns CORS headers
  type: http
  seq: 3

http:
  method: OPTIONS
  url: "{{baseUrl}}/api/data"

runtime:
  scripts:
    - type: tests
      code: |-
        test("status 200", function() { expect(res.status).to.equal(200); });
        test("Access-Control-Allow-Origin is *", function() {
          expect(res.headers['access-control-allow-origin']).to.equal("*");
        });
        test("Access-Control-Allow-Methods includes PUT", function() {
          expect(res.headers['access-control-allow-methods']).to.include("PUT");
        });
