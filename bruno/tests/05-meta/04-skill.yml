info:
  name: GET /skill returns markdown
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/skill"

runtime:
  scripts:
    - type: tests
      code: |-
        test("status 200", function() { expect(res.status).to.equal(200); });
        test("body is a non-empty string", function() {
          const body = typeof res.body === 'string' ? res.body : String(res.body);
          expect(body.length).to.be.above(0);
        });
