info:
  name: MERGE with null removes keys (RFC 7396)
  type: http
  seq: 5

http:
  method: PATCH
  url: "{{baseUrl}}/api/data/test.obj"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      { "c": null }

runtime:
  scripts:
    - type: tests
      code: |-
        const axios = require('axios');
        test("status 200", function() { expect(res.status).to.equal(200); });
        test("c removed, a and b preserved", async function() {
          const r = await axios.get(`${bru.getEnvVar("baseUrl")}/api/data/test.obj`);
          const v = r.data.value;
          expect(v).to.not.have.property("c");
          expect(v.a).to.equal(1);
          expect(v.b).to.equal(3);
        });
