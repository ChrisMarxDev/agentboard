info:
  name: GET returns the set value
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/api/data/test.scalar"

runtime:
  scripts:
    - type: tests
      code: |-
        test("status 200", function() { expect(res.status).to.equal(200); });
        test("value is 42", function() { expect(res.body.value).to.equal(42); });
        test("has updated_at", function() { expect(res.body.updated_at).to.be.a("string"); });
