info:
  name: GET /api/data lists all keys
  type: http
  seq: 15

http:
  method: GET
  url: "{{baseUrl}}/api/data"

runtime:
  scripts:
    - type: tests
      code: |-
        test("status 200", function() { expect(res.status).to.equal(200); });
        test("returns object map", function() {
          expect(res.body).to.be.an("object");
        });
        test("seeded welcome keys present", function() {
          expect(res.body).to.have.property("welcome.users");
          expect(res.body).to.have.property("welcome.status");
        });
