info:
  name: MERGE deep-merges nested objects (RFC 7396)
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{baseUrl}}/api/data/test.obj"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      { "b": 3, "c": 4, "nested": { "z": "w" } }

runtime:
  scripts:
    - type: tests
      code: |-
        const axios = require('axios');
        test("merge status 200", function() { expect(res.status).to.equal(200); });
        test("merge applied correctly (a preserved, b overwritten, c added, nested deep-merged)", async function() {
          const r = await axios.get(`${bru.getEnvVar("baseUrl")}/api/data/test.obj`);
          const v = r.data.value;
          expect(v.a).to.equal(1);
          expect(v.b).to.equal(3);
          expect(v.c).to.equal(4);
          expect(v.nested.x).to.equal("y");
          expect(v.nested.z).to.equal("w");
        });
