info:
  name: List now includes the written page
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/api/content"

runtime:
  scripts:
    - type: tests
      code: |-
        test("status 200", function() { expect(res.status).to.equal(200); });
        test("test-page present in list", function() {
          const paths = res.body.map(p => p.path);
          expect(paths).to.include("/test-page");
        });
