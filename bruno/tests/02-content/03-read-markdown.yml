info:
  name: GET page with Accept text/markdown returns raw source
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/content/test-page"
  headers:
    - name: Accept
      value: text/markdown

runtime:
  scripts:
    - type: tests
      code: |-
        test("status 200", function() { expect(res.status).to.equal(200); });
        test("raw source contains the heading", function() {
          expect(String(res.body)).to.include("# Test Page");
        });
        test("raw source contains the component", function() {
          expect(String(res.body)).to.include("<Metric");
        });
