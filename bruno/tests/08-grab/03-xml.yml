info:
  name: POST /api/grab — xml format
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/api/grab"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "picks": [{ "page": "/test-grab", "card_id": "hello-card" }],
        "format": "xml"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("status 200", function() { expect(res.status).to.equal(200); });
        test("format echoes xml", function() { expect(res.body.format).to.equal("xml"); });
        test("wraps in <agentboard_context>", function() {
          expect(res.body.text).to.match(/^<agentboard_context\b[^>]*>/m);
          expect(res.body.text).to.include("</agentboard_context>");
        });
        test("section + component tags present", function() {
          expect(res.body.text).to.include('<section page="/test-grab"');
          expect(res.body.text).to.include('<component type="Mermaid"');
          expect(res.body.text).to.include("graph LR");
        });
