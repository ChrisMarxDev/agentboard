info:
  name: PUT collection item — creates collection on first item
  type: http
  seq: 11

http:
  method: PUT
  url: "{{baseUrl}}/api/data/test.v2.kanban/task-1"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {"value": {"title": "Build dashboard", "column": "todo"}}

runtime:
  scripts:
    - type: tests
      code: |-
        test("status 200", function() { expect(res.status).to.equal(200); });
        test("shape is collection", function() { expect(res.body._meta.shape).to.equal("collection"); });
        test("value preserved", function() {
          expect(res.body.value.title).to.equal("Build dashboard");
        });
