info:
  name: Tear down — remove every test.v2.* key
  type: http
  seq: 23

http:
  method: GET
  url: "{{baseUrl}}/api/index"

runtime:
  scripts:
    - type: after-response
      code: |-
        const baseUrl = bru.getEnvVar("baseUrl");
        const keys = (res.body.data || [])
          .filter(e => e.key.startsWith("test.v2."))
          .map(e => ({ key: e.key, shape: e.shape }));
        for (const k of keys) {
          try {
            const qs = k.shape === "collection" ? "?confirm=true" : "";
            await fetch(`${baseUrl}/api/${encodeURIComponent(k.key)}${qs}`, { method: "DELETE" });
          } catch (e) {}
        }
        bru.setVar("v2_cleaned", keys.length);
    - type: tests
      code: |-
        test("teardown reachable", function() { expect(res.status).to.equal(200); });
