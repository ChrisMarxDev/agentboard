info:
  name: GET singleton — round-trip envelope
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/test.v2.singleton"

runtime:
  scripts:
    - type: tests
      code: |-
        test("status 200", function() { expect(res.status).to.equal(200); });
        test("value matches set", function() { expect(res.body.value).to.equal(42); });
        test("version is the one we set", function() {
          expect(res.body._meta.version).to.equal(bru.getVar("v2_version"));
        });
