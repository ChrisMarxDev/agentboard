info:
  name: GET collection — lists every item, sorted by ID
  type: http
  seq: 13

http:
  method: GET
  url: "{{baseUrl}}/api/data/test.v2.kanban"

runtime:
  scripts:
    - type: tests
      code: |-
        test("status 200", function() { expect(res.status).to.equal(200); });
        test("shape collection in _meta", function() { expect(res.body._meta.shape).to.equal("collection"); });
        test("two items present", function() { expect(res.body.items.length).to.equal(2); });
        test("first ID is task-1", function() { expect(res.body.items[0].id).to.equal("task-1"); });
        test("second ID is task-2", function() { expect(res.body.items[1].id).to.equal("task-2"); });
