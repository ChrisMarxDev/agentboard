info:
  name: GET /api/components.js serves JavaScript
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/api/components.js"

runtime:
  scripts:
    - type: tests
      code: |-
        test("status 200", function() { expect(res.status).to.equal(200); });
        test("content-type is javascript", function() {
          const ct = (res.headers['content-type'] || '').toLowerCase();
          expect(ct).to.include("javascript");
        });
