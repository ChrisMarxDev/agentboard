info:
  name: Nested path upload works (exports/report.csv)
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/api/files/exports/report.csv"

runtime:
  scripts:
    - type: before-request
      code: |-
        const axios = require('axios');
        const r = await axios.put(
          `${bru.getEnvVar("baseUrl")}/api/files/exports/report.csv`,
          "id,name\n1,Alice\n2,Bob\n",
          {
            headers: { "Content-Type": "text/csv" },
            validateStatus: () => true,
          },
        );
        bru.setVar("nestedPutStatus", r.status);
        bru.setVar("nestedPutName", r.data?.name ?? "");
    - type: tests
      code: |-
        test("PUT nested path → 200", function() {
          expect(Number(bru.getVar("nestedPutStatus"))).to.equal(200);
        });
        test("response echoes the slashed name", function() {
          expect(bru.getVar("nestedPutName")).to.equal("exports/report.csv");
        });
        test("GET reads it back", function() {
          expect(res.status).to.equal(200);
          const body = typeof res.body === "string" ? res.body : String(res.body);
          expect(body).to.include("Alice");
        });
