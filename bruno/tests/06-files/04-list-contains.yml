info:
  name: GET /api/files lists the uploaded file
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/api/files"

runtime:
  scripts:
    - type: tests
      code: |-
        test("status 200", function() { expect(res.status).to.equal(200); });
        test("body is an array", function() { expect(res.body).to.be.an("array"); });
        test("test.png entry present with correct shape", function() {
          const entry = res.body.find(f => f.name === "test.png");
          expect(entry).to.exist;
          expect(entry.content_type).to.equal("image/png");
          expect(entry.size).to.be.above(0);
          expect(entry.etag).to.be.a("string");
          expect(entry.url).to.equal("/api/files/test.png");
        });
