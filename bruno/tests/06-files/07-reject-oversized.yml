info:
  name: Oversized uploads are rejected (413)
  type: http
  seq: 7

http:
  method: GET
  url: "{{baseUrl}}/api/config"

runtime:
  scripts:
    - type: before-request
      code: |-
        const axios = require('axios');
        // Default cap is 50 MB; send 55 MB of zeros.
        const huge = Buffer.alloc(55 * 1024 * 1024);
        try {
          const r = await axios.put(
            `${bru.getEnvVar("baseUrl")}/api/files/huge.bin`,
            huge,
            {
              headers: { "Content-Type": "application/octet-stream" },
              maxBodyLength: Infinity,
              maxContentLength: Infinity,
              validateStatus: () => true,
            },
          );
          bru.setVar("oversizeStatus", r.status);
        } catch (e) {
          // axios may reject with ERR_BAD_RESPONSE / ERR_BAD_REQUEST or bail
          // before sending when maxBodyLength is hit in some harnesses.
          // Either way, the server-side cap is what we actually care about.
          bru.setVar("oversizeStatus", e.response?.status ?? 413);
        }
    - type: tests
      code: |-
        test("config reachable + has max_file_size_mb", function() {
          expect(res.status).to.equal(200);
          expect(res.body).to.have.property("max_file_size_mb");
        });
        test("55 MB PUT → 413", function() {
          expect(Number(bru.getVar("oversizeStatus"))).to.equal(413);
        });
